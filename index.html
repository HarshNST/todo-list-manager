<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <h1>To-Do List Manager</h1>
  </nav>

  <main class="container">
    <section class="intro">
      <h2>My To-Do Tasks</h2>
      <p>Tasks fetched from a public API using JavaScript fetch()</p>
    </section>

    <div id="loading" class="message loading">Loading tasks...</div>
    <div id="error" class="message error"></div>

    <section id="todoContainer" class="todo-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
